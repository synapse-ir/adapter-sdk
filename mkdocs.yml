site_name: SYNAPSE Adapter SDK
site_url: https://synapse-ir.github.io/adapter-sdk
site_description: The intelligence layer above the AI protocol layer
repo_url: https://github.com/synapse-ir/adapter-sdk
repo_name: synapse-ir/adapter-sdk

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    primary: blue
    accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - First Adapter: getting-started/first-adapter.md
    - Validation: getting-started/validation.md
  - Reference:
    - Canonical IR: reference/canonical-ir.md
    - AdapterBase: reference/adapter-base.md
    - AdapterValidator: reference/validator.md
    - Cache Layers: reference/caches.md
  - Adapters:
    - Available Adapters: adapters/index.md
    - NER BERT: adapters/ner-bert.md
    - OpenAI Classifier: adapters/openai-classifier.md
    - JSL Clinical NER: adapters/ner-clinical.md
    - Docling: adapters/docling.md
    - all-MiniLM-L6-v2: adapters/all-minilm.md
    - BART Large CNN: adapters/bart-large-cnn.md
    - FinBERT: adapters/finbert.md
    - opus-mt-en-fr: adapters/opus-mt-en-fr.md
    - ms-marco-MiniLM-L6-v2: adapters/ms-marco.md
    - twitter-roberta-sentiment: adapters/twitter-roberta.md
    - bart-large-mnli: adapters/bart-large-mnli.md
    - whisper-large-v3: adapters/whisper-large-v3.md
    - clip-vit-base-patch32: adapters/clip-vit-base-patch32.md
    - ClinicalBERT: adapters/clinicalbert.md
  - Design:
    - Architecture: architecture.md
    - Security Requirements: security.md
    - Assurance Case: assurance.md
  - Specification: https://github.com/synapse-ir/spec
  - Roadmap: https://github.com/synapse-ir/adapter-sdk/blob/main/ROADMAP.md
  - Contributing: https://github.com/synapse-ir/adapter-sdk/blob/main/CONTRIBUTING.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - admonition
  - toc:
      permalink: true
