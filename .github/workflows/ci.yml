name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy type check
        run: uv run mypy src/

      - name: Pytest
        env:
          PYTHONOPTIMIZE: "0"
        run: uv run pytest tests/ -v --tb=short --cov=synapse_sdk --cov-branch --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Dynamic analysis (property-based tests)
        env:
          PYTHONOPTIMIZE: "0"
        run: uv run pytest tests/test_properties.py -v --tb=short

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30
