name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy type check
        run: uv run mypy src/
      - name: Pytest
        run: uv run pytest tests/ -v --tb=short
