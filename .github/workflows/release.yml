name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write      # create GitHub release
  id-token: write      # OIDC token for PyPI trusted publishing + sigstore attestations

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=synapse_sdk --cov-branch --cov-fail-under=80

      - name: Build package
        run: uv build

      - name: Publish to PyPI (trusted publishing + sigstore attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
